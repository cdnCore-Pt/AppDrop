name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from info.xml
        id: version
        run: |
          version=$(grep '<version>' appinfo/info.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d '[:space:]')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .tar.gz package
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p build/appdrop
          rsync -a \
            --exclude='build' \
            --exclude='certs' \
            --exclude='scripts' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='psalm.xml' \
            --exclude='phpunit.xml' \
            --exclude='.php-cs-fixer.dist.php' \
            --exclude='.php-cs-fixer.cache' \
            --exclude='composer.lock' \
            --exclude='composer.json' \
            --exclude='Makefile' \
            --exclude='krankerl.toml' \
            --exclude='.nextcloudignore' \
            --exclude='.gitignore' \
            --exclude='HOW_TO_DEPLOY_TO_APPSTORE.md' \
            --exclude='article-nextcloud-custom-app.md' \
            --exclude='CONTRIBUTING.md' \
            --exclude='SECURITY.md' \
            --exclude='.phpunit.result.cache' \
            --exclude='screenshots' \
            --exclude='lefthook.yml' \
            ./ build/appdrop/
          cd build && tar -czf "appdrop-${{ steps.version.outputs.version }}.tar.gz" appdrop

      - name: Create tag and GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AppDrop v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: build/appdrop-${{ steps.version.outputs.version }}.tar.gz
