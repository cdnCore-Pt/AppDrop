# Temporary Nextcloud dev environment for signing the AppDrop release tarball
# (occ integrity:sign-app needs a running Nextcloud with PHP). SQLite + auto-install,
# no exposed ports — the script talks to the container via `docker compose exec`.
#
# Bring up:   docker compose -p nextcloud -f .runtime/docker-compose.yml up -d
# Tear down:  docker compose -p nextcloud -f .runtime/docker-compose.yml down -v

services:
  app:
    image: nextcloud:30
    environment:
      SQLITE_DATABASE: nextcloud
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
    # No bind mount of the app: the bind populating /var/www/html mid-init
    # confuses the entrypoint ("Cannot write into apps directory"). The script
    # copies the staged tree into the container with `docker cp` at sign time
    # instead, which keeps this compose generic and avoids the install race.
    volumes:
      - nc-html:/var/www/html

volumes:
  nc-html:
